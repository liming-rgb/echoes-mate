<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Echo rings (outer, fading) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Speech bubble -->
  <path d="M170 140 Q170 110 200 110 L312 110 Q342 110 342 140 L342 260 Q342 290 312 290 L260 290 L210 340 L220 290 L200 290 Q170 290 170 260 Z"
        fill="url(#bubble)"/>

  <!-- Echo waves inside bubble -->
  <path d="M210 190 Q225 175 256 175 Q287 175 302 190"
        fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
  <path d="M215 215 Q235 200 256 200 Q277 200 297 215"
        fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <path d="M220 240 Q238 225 256 225 Q274 225 292 240"
        fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
</svg>
